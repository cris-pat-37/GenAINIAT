<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenAI NIAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1>Savage Sigma AI</h1>
            <p>Chatbot + PDF summarizer</p>
          </div>
        </div>

        <button class="new-chat" id="newChat" type="button">New chat</button>

        <nav class="mode-list" aria-label="Project mode">
          <button class="mode-item active" type="button" data-tab="chat">
            <span>Savage Chat</span>
            <small>Attitude AI assistant</small>
          </button>
          <button class="mode-item" type="button" data-tab="pdf">
            <span>PDF Summarizer</span>
            <small>Upload, summarize, revise</small>
          </button>
        </nav>

        <section class="settings">
          <div class="settings-head">
            <strong>Settings</strong>
            <button id="clearSettings" type="button">Reset</button>
          </div>

          <label>
            API key
            <input id="apiKey" type="password" placeholder="Server key is used by default" autocomplete="off" />
          </label>

          <label>
            Model
            <select id="model">
              <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
              <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
              <option value="mixtral-8x7b-32768">mixtral-8x7b-32768</option>
              <option value="gemma2-9b-it">gemma2-9b-it</option>
            </select>
          </label>

          <label id="toneWrap">
            Tone
            <select id="tone">
              <option value="savage">Savage</option>
              <option value="mentor">Mentor</option>
              <option value="exam">Exam</option>
            </select>
          </label>

          <label id="summaryWrap" class="hidden">
            Summary mode
            <select id="summaryMode">
              <option value="quick">Quick</option>
              <option value="deep" selected>Deep</option>
              <option value="creative">Creative</option>
              <option value="exam">Exam</option>
            </select>
          </label>
        </section>

        <div class="status" id="apiStatus">Checking backend...</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button class="mobile-menu" id="mobileMenu" type="button">Menu</button>
          <div>
            <p id="modeLabel">Savage Chat</p>
            <h2 id="workspaceTitle">Ask Sigma anything</h2>
          </div>
          <div class="identity">
            <span>Name</span>
            <strong id="userName">Not set</strong>
          </div>
        </header>

        <section class="chat-stream" id="chatLog" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">S</div>
            <div class="message-body">
              <strong>Savage Sigma AI</strong>
              <p>Drop your name first. Then ask me coding, GenAI, viva, or project questions. I will help, but I am not here to babysit weak prompts.</p>
            </div>
          </article>
        </section>

        <section class="suggestions" id="suggestions">
          <button type="button" data-prompt="My name is Sunny">Set my name</button>
          <button type="button" data-prompt="Explain RAG in simple words">Explain RAG</button>
          <button type="button" data-prompt="Prepare me for a GenAI project viva">Viva prep</button>
        </section>

        <form class="composer" id="chatForm">
          <input id="pdfFile" type="file" accept="application/pdf" hidden />
          <button id="attachPdf" class="attach hidden" type="button">Upload PDF</button>
          <input id="chatInput" type="text" placeholder="Message Savage Sigma AI..." autocomplete="off" />
          <button id="sendButton" type="submit">Send</button>
        </form>
        <div class="file-chip hidden" id="fileChip">
          <span id="fileName">No file selected</span>
          <button id="clearFile" type="button">Remove</button>
        </div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/assets/app.js"></script>
  </body>
</html>
