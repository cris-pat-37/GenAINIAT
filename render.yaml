services:
  - type: web
    name: genainiat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: llama-3.1-8b-instant

